<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 007</title>
</head>
<body>
    <h1>Crie sua Conta Globo, é grátis</h1>
    <p>Uma conta única e gratuita para todos os produtos Globo. <br>
    <a href="https://authx.globoid.globo.com/6870/register/personal-data">Entenda como a Conta Globo funciona.</a></p>
    <form>
        <label for="nome">Nome completo</label><br>
        <input id="nome" type="text" placeholder="Informe o seu nome completo" required><br><br>

        <label for="email">Informe o seu e-mail</label><br>
        <input id="email" type="email" placeholder="Ex: @gmail, @outlook, @yahoo, etc." required><br><br>

        <label for="data">Data de Nascimento</label><br>
        <input id="data" type="number" placeholder="dd/mm/aaaa" required><br><br>

        <input type="submit" value="Próximo">
    </form>
</body>
</html>
