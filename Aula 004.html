<!DOCTYPE html>

<body>
    <h1>Atividade 004</h1>
    <q> A tag <iframe> (abreviação de inline frame ou quadro interno) em HTML é utilizada para inserir outro documento HTML (como uma página web, vídeo ou mapa) dentro da página web atual. Ela atua como uma "janela" ou uma sub-janela, permitindo visualizar conteúdo externo sem que o usuário saia do site original.</q>
    <hr>
    
    <!-- Através do <iframe> é possível colocar um vídeo do youtube no documento html sem que ele precise ser baixado-->
    
    <p>Crie uma página HTML que contenha um iframe. O iframe deve exibir o conteúdo de uma página da web de sua escolha. Certifique-se de que o iframe tenha um tamanho adequado para exibir o conteúdo corretamente.</p>
    
    <br>
    
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3658.3798984119385!2d-46.70742612467113!3d-23.51883487882893!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94cef86137ded653%3A0x9e5189e4b657f8e2!2sFaculdade%20Flamingo!5e0!3m2!1spt-BR!2sbr!4v1772753141772!5m2!1spt-BR!2sbr" width="200" height="150" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

</body>
</html>
