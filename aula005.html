<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 005</title>
</head>
<body>
    <h1>Aula 005 - <em>Formulários</em></h1>
    <form>
        <p>Campo de texto</p>
        <input type="text" placeholder="Digite seu nome de usuario">

        <p>Campo de senha</p>
        <input type="password" placeholder="Digite sua senha">

        <p>Campo de email</p>
        <input type="email" placeholder="Digite seu email">

        <p>Campo de número</p>
        <input type="number" placeholder="Digite sua idade">

        <p>Campo de data</p>
        <input type="date" placeholder="Digite sua data de nascimento">
        <hr>

        <h2>Explore 5 'input' diferentes</h2>

        <p>Campo de cor</p>
        <input type="color"
        >

        <p>Campo de hora</p>
        <input type="time" >

        <p>Campo de semana</p>
        <input type="week" >

        <p>Campo de faixa</p>
        <input type="range" >

        <p>Campo de telefone</p>
        <input type="tel" placeholder="Digite seu número de telefone">  
    </form>
    <!--placeholder = marca d'água. Alguns inputs comportam placeholder porque não têm label associada-->
</body>
</html>
